services:
  servidor:
    image: lrprll/connect6-server:latest
    ports:
      - "8080:8080"
      - "50051:50051"
    networks:
      - game-network

  ia-main:
    build: 
      context: .
      dockerfile: agente_cpp/Dockerfile
    restart: always
    environment:
      - SERVER_ADDR=servidor:50051
      - TEAM_NAME=Bot_CPP_AngSei
    depends_on:
      - servidor
    networks:
      - game-network

networks:
  game-network:
    driver: bridge